# ==============================================================
# EvolveHub - Java 服务编排（不含基础设施）
# ==============================================================
# 前提：PostgreSQL / Redis / Minio 已独立部署
#
# Usage:
#   docker compose -f docker-compose-services.yml up -d
#   docker compose -f docker-compose-services.yml up -d evolvehub-auth   # 单个服务
#   docker compose -f docker-compose-services.yml logs -f evolvehub-auth # 查看日志
#
# 推荐通过 deploy.sh 调用，自动完成 Maven 打包 + 镜像构建 + 启动
# ==============================================================

services:
  evolvehub-gateway:
    image: ${DOCKER_REGISTRY:+${DOCKER_REGISTRY}/}evolvehub-gateway:${IMAGE_TAG:-latest}
    container_name: evolvehub-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      REDIS_HOST: ${REDIS_HOST:-localhost}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    networks:
      - evolvehub-net

  evolvehub-auth:
    image: ${DOCKER_REGISTRY:+${DOCKER_REGISTRY}/}evolvehub-auth:${IMAGE_TAG:-latest}
    container_name: evolvehub-auth
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: ${DB_HOST:-localhost}
      DB_PORT: ${DB_PORT:-5432}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: ${REDIS_HOST:-localhost}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    networks:
      - evolvehub-net

  evolvehub-ai:
    image: ${DOCKER_REGISTRY:+${DOCKER_REGISTRY}/}evolvehub-ai:${IMAGE_TAG:-latest}
    container_name: evolvehub-ai
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: ${DB_HOST:-localhost}
      DB_PORT: ${DB_PORT:-5432}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: ${REDIS_HOST:-localhost}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://localhost:9000}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
    networks:
      - evolvehub-net

  evolvehub-admin:
    image: ${DOCKER_REGISTRY:+${DOCKER_REGISTRY}/}evolvehub-admin:${IMAGE_TAG:-latest}
    container_name: evolvehub-admin
    restart: unless-stopped
    ports:
      - "8083:8083"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: ${DB_HOST:-localhost}
      DB_PORT: ${DB_PORT:-5432}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: ${REDIS_HOST:-localhost}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    networks:
      - evolvehub-net

networks:
  evolvehub-net:
    driver: bridge
