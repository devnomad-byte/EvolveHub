# ==============================================================
# EvolveHub AI Platform - Development Profile
# ==============================================================
server:
  port: 8082

spring:
  # ----- DataSource (Docker Compose PostgreSQL, shared with auth for RBAC) -----
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:evolvehub}
    username: ${DB_USERNAME:evolvehub}
    password: ${DB_PASSWORD:evolvehub123}
    driver-class-name: org.postgresql.Driver

  # ----- Redis (Docker Compose Redis, database 0 shared with auth for Sa-Token session) -----
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0

# ----- S3 / MinIO (Docker Compose MinIO) -----
s3:
  enabled: true
  endpoint: ${S3_ENDPOINT:http://localhost:9000}
  region: ${S3_REGION:us-east-1}
  access-key: ${S3_ACCESS_KEY:evolvehub}
  secret-key: ${S3_SECRET_KEY:evolvehub123}
  bucket: ${S3_BUCKET:evolvehub}
  path-style-access-enabled: true
  auto-create-bucket: true

# ----- Milvus (Docker Compose Milvus Standalone) -----
milvus:
  uri: ${MILVUS_URI:http://localhost:19530}
  token: ${MILVUS_TOKEN:}
  collection-name: eh_chat_memory
  dimensions: 1536

# ----- Logging (development: show SQL) -----
logging:
  level:
    org.evolve: DEBUG
    com.baomidou.mybatisplus: DEBUG
