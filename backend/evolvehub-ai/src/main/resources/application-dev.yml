# ==============================================================
# EvolveHub AI Platform - Development Profile
# ==============================================================
server:
  port: 8082

spring:
  # ----- DataSource (shared PostgreSQL with auth for RBAC) -----
  datasource:
    url: jdbc:postgresql://localhost:${DB_PORT:5432}/evolve_hub
    username: postgres
    password: Postgres@2026
    driver-class-name: org.postgresql.Driver

  # ----- Redis (database 0, shared with auth for Sa-Token session) -----
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:Redis@2026}
      database: 0

# ----- S3  -----
s3:
  enabled: true
  endpoint: ${S3_ENDPOINT:http://localhost:9000}
  region: ${S3_REGION:us-east-1}
  access-key: ${S3_ACCESS_KEY:minioadmin}
  secret-key: ${S3_SECRET_KEY:minioadmin}
  bucket: ${S3_BUCKET:evolvehub}
  path-style-access-enabled: true
  auto-create-bucket: true

# ----- Milvus (Zilliz Cloud) -----
milvus:
  uri: https://in05-310089dbc221c5a.serverless.aws-eu-central-1.cloud.zilliz.com
  token: f21ffb509bf216f9447cb338bc5d7842e5884ef72fd1a59536337126e32be47202ce3942e1428aafe8149964370302f39fc19963
  collection-name: eh_chat_memory
  dimensions: 1536

# ----- Logging (development: show SQL) -----
logging:
  level:
    org.evolve: DEBUG
    com.baomidou.mybatisplus: DEBUG
