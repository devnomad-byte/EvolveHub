# ==============================================================
# EvolveHub Admin Service - Development Profile
# ==============================================================
server:
  port: 8083
spring:
  # ----- DataSource (local PostgreSQL, 与 auth 共用同一库) -----
  datasource:
    url: jdbc:postgresql://localhost:${DB_PORT:5432}/evolve_auth
    username: postgres
    password: Postgres@2026
    driver-class-name: org.postgresql.Driver

  # ----- Redis (shared token store with auth) -----
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: 0


# ----- S3 (MinIO) -----
s3:
  enabled: true
  endpoint: ${S3_ENDPOINT:http://106.15.231.177:9000}
  region: ${S3_REGION:us-east-1}
  bucket: ${S3_BUCKET:evolvehub}
  access-key: ${S3_ACCESS_KEY:admin}
  secret-key: ${S3_SECRET_KEY:a774461674}

# ----- Sa-Token -----
sa-token:
  token-name: Authorization
  timeout: 86400
  active-timeout: -1
  is-concurrent: true
  token-style: uuid

# ----- Logging (development: show SQL) -----
logging:
  level:
    org.evolve: DEBUG
    com.baomidou.mybatisplus: DEBUG
